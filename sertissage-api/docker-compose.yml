version: '3.8'

services:

  # ── Banco de Dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sertissage-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sertissage
      POSTGRES_USER:     ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d sertissage"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Spring Boot ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sertissage-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Sobrescreve o DATABASE_URL do .env para usar o hostname do Docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/sertissage
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: