# ─────────────────────────────────────────────────────────────────────────────
# Perfil DEV — usado com: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# Lê as variáveis do .env (exportadas no shell ou via IDE).
# Para banco local fora do Docker: DATABASE_URL deve apontar para localhost:5432
# ─────────────────────────────────────────────────────────────────────────────

# Dialeto PostgreSQL explícito no perfil dev
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console desabilitado no perfil dev com Postgres
spring.h2.console.enabled=false

# JWT dev — usa o do .env ou fallback
app.jwt.secret=${JWT_SECRET:sertissage-dev-secret-key-minimo-256-bits-para-hmac-sha}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logs mais verbosos no dev
logging.level.br.com.sertissage=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=DEBUG