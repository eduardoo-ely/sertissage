# Banco em memória H2
# Usar com: --spring.profiles.active=dev

spring.datasource.url=jdbc:h2:mem:sertissage;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=sertissage-dev-secret-key-minimo-256-bits-para-hmac-sha
app.jwt.expiration-ms=86400000

logging.level.br.com.sertissage=DEBUG
logging.level.org.springframework.security=WARN