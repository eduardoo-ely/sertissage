# Application
spring.application.name=sertissage
server.port=${SERVER_PORT:8080}

# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:sertissage}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# ── JPA/Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:sertissage-dev-secret-key-minimo-256-bits-para-hmac-sha}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.br.com.sertissage=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=WARN

# ── Swagger/OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never