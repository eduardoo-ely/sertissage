version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: sertissage-db
    restart: always

    environment:
      POSTGRES_DB: sertissage
      POSTGRES_USER: sertissage_admin
      POSTGRES_PASSWORD: Serti@ssage4738

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: